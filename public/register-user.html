<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Passkey Registrierung (Clean)</title>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 20px; max-width: 400px; margin: 0 auto; }
    input { width: 100%; padding: 12px; font-size: 16px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; }
    button { width: 100%; padding: 12px; font-size: 16px; background: #007AFF; color: white; border: none; border-radius: 8px; cursor: pointer; }
    button:disabled { background: #ccc; }
    #status { margin-top: 20px; padding: 10px; border-radius: 8px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    #log { margin-top: 20px; font-size: 12px; background: #f5f5f5; padding: 10px; border-radius: 8px; white-space: pre-wrap; max-height: 200px; overflow: auto; }
  </style>
</head>
<body>
  <h2>Passkey Registrierung</h2>
  <input type="text" id="username" placeholder="Username eingeben" autocomplete="off" />
  <button id="registerBtn" onclick="register()">Registrieren</button>
  <div id="status"></div>
  <div id="log"></div>

  <script>
    function log(msg) {
      console.log(msg);
      document.getElementById('log').textContent += msg + '\n';
    }

    function showStatus(msg, isError) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = isError ? 'error' : 'success';
    }

    function base64ToArrayBuffer(base64) {
      const binary = atob(base64.replace(/-/g, '+').replace(/_/g, '/'));
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes.buffer;
    }

    function arrayBufferToBase64(buffer) {
      let binary = '';
      const bytes = new Uint8Array(buffer);
      for (let i = 0; i < bytes.byteLength; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    async function register() {
      const username = document.getElementById('username').value.trim();
      if (!username) {
        alert('Bitte Username eingeben');
        return;
      }

      document.getElementById('registerBtn').disabled = true;
      document.getElementById('log').textContent = '';
      log('Starte Registrierung für: ' + username);

      try {
        // 1. Challenge holen
        log('Hole Challenge vom Server...');
        const optionsRes = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username })
        });

        const options = await optionsRes.json();
        log('Options erhalten: challenge=' + options.challenge.substring(0, 20) + '...');

        // 2. Challenge und user.id zu ArrayBuffer
        options.challenge = base64ToArrayBuffer(options.challenge);
        options.user.id = base64ToArrayBuffer(options.user.id);

        // 3. excludeCredentials konvertieren falls vorhanden
        if (options.excludeCredentials) {
          options.excludeCredentials = options.excludeCredentials.map(c => ({
            ...c,
            id: base64ToArrayBuffer(c.id)
          }));
        }

        // 4. WebAuthn Registrierung
        log('Starte WebAuthn navigator.credentials.create...');
        const credential = await navigator.credentials.create({ publicKey: options });
        log('Credential erstellt: ' + credential.id.substring(0, 20) + '...');

        // 5. Credential an Server senden
        const credentialData = {
          id: credential.id,
          rawId: arrayBufferToBase64(credential.rawId),
          response: {
            attestationObject: arrayBufferToBase64(credential.response.attestationObject),
            clientDataJSON: arrayBufferToBase64(credential.response.clientDataJSON)
          },
          type: credential.type
        };

        log('Sende Credential an Server...');
        const verifyRes = await fetch('/api/register/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, credential: credentialData })
        });

        const result = await verifyRes.json();
        log('Server Antwort: ' + JSON.stringify(result));

        if (result.success) {
          showStatus('Registrierung erfolgreich!', false);
          log('ERFOLG - User ' + username + ' registriert');
        } else {
          showStatus('Fehler: ' + (result.error || 'Unbekannt'), true);
        }

      } catch (err) {
        log('FEHLER: ' + err.message);
        showStatus('Fehler: ' + err.message, true);
      }

      document.getElementById('registerBtn').disabled = false;
    }
  </script>
</body>
</html>
