<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Successful</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
        margin: 0;
        background: #f5f5f7;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        max-width: 400px;
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        text-align: center;
      }
      .success-icon {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: #34C759;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 auto 24px;
      }
      .success-icon svg {
        width: 32px;
        height: 32px;
        fill: white;
      }
      h1 {
        color: #1d1d1f;
        margin: 0 0 16px;
        font-size: 24px;
        font-weight: 600;
      }
      .message {
        color: #86868b;
        font-size: 15px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="success-icon">
        <svg viewBox="0 0 24 24">
          <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
        </svg>
      </div>
      <h1>Registration Successful!</h1>
      <div class="message">
        Your PasskeyGuard passkey has been successfully created and registered. You can now use it for secure authentication across supported websites.
      </div>
    </div>
  </body>
</html>
