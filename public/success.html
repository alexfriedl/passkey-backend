<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Successful - PasskeyGuard</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
        margin: 0;
        background: #f5f5f7;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        max-width: 400px;
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        text-align: center;
      }
      .success-icon {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: #34C759;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 auto 24px;
      }
      .success-icon svg {
        width: 32px;
        height: 32px;
        fill: white;
      }
      h1 {
        color: #1d1d1f;
        margin: 0 0 12px;
        font-size: 24px;
        font-weight: 600;
      }
      .message {
        color: #86868b;
        font-size: 15px;
        line-height: 1.5;
        margin-bottom: 32px;
      }
      .info-box {
        background: #f5f5f7;
        border-radius: 8px;
        padding: 16px;
        margin: 24px 0;
        text-align: left;
      }
      .info-box h3 {
        margin: 0 0 12px;
        color: #1d1d1f;
        font-size: 14px;
        font-weight: 600;
      }
      .feature {
        margin: 8px 0;
        padding: 4px 0;
        font-size: 14px;
        color: #1d1d1f;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .feature-icon {
        color: #34C759;
        font-size: 16px;
      }
      .button {
        background: #007AFF;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 15px;
        font-weight: 600;
        margin: 8px;
        text-decoration: none;
        display: inline-block;
      }
      .button.secondary {
        background: #e5e5ea;
        color: #1d1d1f;
      }
      .footer {
        margin-top: 24px;
        font-size: 13px;
        color: #86868b;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="success-icon">
        <svg viewBox="0 0 24 24">
          <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
        </svg>
      </div>
      <h1>Registrierung erfolgreich</h1>

      <div class="message">
        Dein Passkey wurde erstellt und ist einsatzbereit.
      </div>

      <div class="info-box">
        <h3>Dein Passkey ist:</h3>
        <div class="feature">
          <span class="feature-icon">&#10003;</span>
          Hardware-geschützt
        </div>
        <div class="feature">
          <span class="feature-icon">&#10003;</span>
          Mit Face ID / Touch ID gesichert
        </div>
        <div class="feature">
          <span class="feature-icon">&#10003;</span>
          Sofort einsatzbereit
        </div>
      </div>

      <div class="footer">
        Du kannst dieses Fenster jetzt schließen.
      </div>
    </div>
  </body>
</html>
